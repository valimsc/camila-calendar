<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#000000">
<title>Calendário de Conteúdo — Dra. Camila Pancoti</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{-webkit-tap-highlight-color:transparent}
body{background:#000;color:#fff;font-family:'DM Sans',sans-serif;max-width:430px;margin:0 auto;min-height:100dvh;overflow-x:hidden}

.header{padding:18px 20px 14px;border-bottom:1px solid #1e1e1e;display:flex;align-items:center;justify-content:center;min-height:62px}
.header img{height:34px;width:auto;display:block}
.logo-txt{font-family:'Bebas Neue',cursive;font-size:26px;letter-spacing:.12em;color:#fff}

.week-nav{display:flex;align-items:center;padding:14px 16px 10px;gap:8px}
.nav-btn{background:#1A1A1A;border:none;color:#fff;width:38px;height:38px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0;transition:background .15s}
.nav-btn:hover{background:#FF1A1A}
.nav-btn:active{background:#c90000}
.week-info{flex:1;text-align:center}
.week-num{font-family:'Bebas Neue',cursive;font-size:17px;letter-spacing:.1em;line-height:1}
.week-range{font-size:12px;color:#666;margin-top:3px}

.cards{padding:8px 16px 40px;display:flex;flex-direction:column;gap:10px}
.day-card{background:#1A1A1A;border-radius:14px;padding:16px 16px 14px;border:1.5px solid transparent;cursor:pointer;position:relative;transition:border-color .15s,background .1s;user-select:none}
.day-card:active{background:#222}
.day-card.is-today{border-color:#FF1A1A}
.day-card.is-empty{opacity:.55}
.card-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.card-left{display:flex;align-items:center;gap:10px}
.dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.dot.filled{background:#FF1A1A}
.dot.empty{background:#3a3a3a}
.day-name-lbl{font-family:'Bebas Neue',cursive;font-size:24px;letter-spacing:.05em;line-height:1}
.today-badge{background:#FF1A1A;color:#fff;font-size:9px;font-weight:700;letter-spacing:.12em;padding:3px 8px;border-radius:4px;text-transform:uppercase}
.card-date{font-size:12px;color:#555;padding-left:18px}
.card-preview{margin-top:8px;padding-left:18px;font-size:13px;color:#999;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:calc(100% - 36px)}
.card-chev{position:absolute;right:14px;top:50%;transform:translateY(-50%);color:#FF1A1A;font-size:20px;line-height:1}

.detail-view{position:fixed;inset:0;background:#000;z-index:50;overflow-y:auto;max-width:430px;left:50%;transform:translateX(-50%);width:100%}
.detail-hdr{position:sticky;top:0;background:#000;border-bottom:1px solid #1e1e1e;padding:16px 20px;display:flex;align-items:center;gap:14px;z-index:10}
.back-btn{background:#1A1A1A;border:none;color:#fff;width:36px;height:36px;border-radius:50%;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.back-btn:hover{background:#2E2E2E}
.d-day{font-family:'Bebas Neue',cursive;font-size:22px;letter-spacing:.05em}
.d-date{font-size:12px;color:#555;margin-top:1px}

.detail-body{padding:20px 16px 56px}
.blk{margin-bottom:28px}
.blk-title{font-family:'Bebas Neue',cursive;font-size:11px;letter-spacing:.22em;color:#FF1A1A;border-bottom:1px solid #111;padding-bottom:8px;margin-bottom:16px}
.fld{margin-bottom:16px}
.fld-key{font-size:10px;font-weight:700;letter-spacing:.12em;color:#444;text-transform:uppercase;margin-bottom:5px}
.fld-val{font-size:14px;line-height:1.55;color:#ddd}
.fld-val.red{color:#FF1A1A;font-weight:500;font-style:italic}

.pilar-badge{display:inline-block;padding:3px 10px;border-radius:5px;font-size:11px;font-weight:700;letter-spacing:.04em;text-transform:uppercase}
.pb-a{background:#fff;color:#000}
.pb-r{background:#FF1A1A;color:#fff}
.pb-c{background:#2E2E2E;color:#fff;border:1px solid #444}

.stories-seq{display:flex;flex-direction:column;gap:10px}
.story-card{background:#0f0f0f;border-radius:10px;padding:12px 14px;border-left:3px solid #222}
.story-card.s3{border-left-color:#FF1A1A}
.story-num{font-size:10px;font-weight:700;letter-spacing:.12em;color:#444;text-transform:uppercase;margin-bottom:5px}
.s3 .story-num{color:#FF1A1A}
.story-txt{font-size:13px;line-height:1.55;color:#bbb}
.interact-type{display:inline-block;background:#FF1A1A;color:#fff;font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;padding:2px 8px;border-radius:4px;margin-bottom:6px}

.load-wrap{padding:60px 24px;text-align:center;color:#444}
.spinner{width:26px;height:26px;border:2px solid #1a1a1a;border-top-color:#FF1A1A;border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 14px}
@keyframes spin{to{transform:rotate(360deg)}}
.err-msg{margin:16px;padding:14px;background:#110000;border:1px solid #3a0000;border-radius:10px;font-size:13px;color:#ff5555;text-align:center;line-height:1.5}
.empty-day{padding:52px 24px;text-align:center;color:#333}
.empty-day h3{font-family:'Bebas Neue',cursive;font-size:18px;letter-spacing:.1em;margin-bottom:8px;color:#2a2a2a}
.empty-day p{font-size:13px;line-height:1.5}
</style>
</head>
<body>

<div id="mainView">
  <header class="header">
    <img src="logo.png" alt="NeuroAdapt" id="logoImg"
         onerror="this.style.display='none';document.getElementById('logoTxt').style.display='block'">
    <span class="logo-txt" id="logoTxt" style="display:none">NEUROADAPT</span>
  </header>

  <nav class="week-nav">
    <button class="nav-btn" onclick="changeWeek(-1)" aria-label="Semana anterior">&#8592;</button>
    <div class="week-info">
      <div class="week-num" id="weekNum"></div>
      <div class="week-range" id="weekRange"></div>
    </div>
    <button class="nav-btn" onclick="changeWeek(1)" aria-label="Próxima semana">&#8594;</button>
  </nav>

  <div id="cardsArea"></div>
</div>

<div id="detailView" class="detail-view" style="display:none">
  <div class="detail-hdr">
    <button class="back-btn" onclick="closeDetail()">&#8592;</button>
    <div>
      <div class="d-day" id="detailDay"></div>
      <div class="d-date" id="detailDate"></div>
    </div>
  </div>
  <div class="detail-body" id="detailBody"></div>
</div>

<script>
const SUPA_URL = 'https://guarowyyhqlbtqdntuji.supabase.co';
const SUPA_KEY = 'sb_publishable_DoQLD1mpR2oDOuh_5ToBQQ_ue3p3b8U';

const DAYS  = ['Segunda-feira','Terça-feira','Quarta-feira','Quinta-feira','Sexta-feira'];
const DAYS_S = ['SEG','TER','QUA','QUI','SEX'];
const MONTHS  = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
const MONTHS_S = ['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];

let weekOffset = 0;
let weekData   = Array(5).fill(null);
let weekMonday = null;

function isoWeek(d) {
  const t = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
  const dow = t.getUTCDay() || 7;
  t.setUTCDate(t.getUTCDate() + 4 - dow);
  const y = t.getUTCFullYear();
  const jan1 = new Date(Date.UTC(y, 0, 1));
  return { year: y, week: Math.ceil(((t - jan1) / 86400000 + 1) / 7) };
}

function getMonday(d) {
  const r = new Date(d); r.setHours(0,0,0,0);
  const dow = r.getDay();
  r.setDate(r.getDate() - (dow === 0 ? 6 : dow - 1));
  return r;
}

function weekKey(mon) {
  const { year, week } = isoWeek(mon);
  return `${year}_W${String(week).padStart(2,'0')}`;
}

function addDays(d, n) {
  const r = new Date(d); r.setDate(r.getDate() + n); return r;
}

function isToday(d) {
  const t = new Date();
  return d.getDate()===t.getDate() && d.getMonth()===t.getMonth() && d.getFullYear()===t.getFullYear();
}

function fmtDate(d) { return `${d.getDate()} de ${MONTHS[d.getMonth()]}`; }

function updateLabel(mon) {
  const fri = addDays(mon, 4);
  const { week } = isoWeek(mon);
  document.getElementById('weekNum').textContent = `Semana ${week}`;
  document.getElementById('weekRange').textContent =
    mon.getMonth() === fri.getMonth()
      ? `${mon.getDate()} a ${fri.getDate()} de ${MONTHS[mon.getMonth()]}`
      : `${mon.getDate()} ${MONTHS_S[mon.getMonth()]} – ${fri.getDate()} ${MONTHS_S[fri.getMonth()]}`;
}

function esc(s) {
  return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function pilarCls(p) {
  if (!p) return 'pb-a';
  const l = p.toLowerCase();
  if (l.includes('autoridade')) return 'pb-a';
  if (l.includes('rotina'))     return 'pb-r';
  return 'pb-c';
}

async function loadWeek() {
  const ref = new Date(); ref.setDate(ref.getDate() + weekOffset * 7);
  weekMonday = getMonday(ref);
  updateLabel(weekMonday);

  const area = document.getElementById('cardsArea');
  area.innerHTML = '<div class="load-wrap"><div class="spinner"></div><div>Carregando...</div></div>';

  try {
    const key = weekKey(weekMonday);
    const res = await fetch(
      `${SUPA_URL}/rest/v1/calendar_content?week_key=eq.${key}&order=day_index`,
      { headers: { apikey: SUPA_KEY, Authorization: `Bearer ${SUPA_KEY}` } }
    );
    if (!res.ok) throw new Error(res.status);
    const rows = await res.json();
    weekData = Array(5).fill(null);
    rows.forEach(r => { if (r.day_index >= 0 && r.day_index <= 4) weekData[r.day_index] = r; });
    renderCards();
  } catch {
    area.innerHTML = '<div class="err-msg">Erro ao carregar dados. Verifique a conexão.</div>';
  }
}

function renderCards() {
  const html = weekData.map((row, i) => {
    const d = addDays(weekMonday, i);
    const tod = isToday(d);
    const has = !!row;
    return `
      <div class="day-card${tod?' is-today':''}${!has?' is-empty':''}" onclick="openDetail(${i})">
        <div class="card-top">
          <div class="card-left">
            <span class="dot ${has?'filled':'empty'}"></span>
            <span class="day-name-lbl">${DAYS_S[i]}</span>
          </div>
          ${tod ? '<span class="today-badge">HOJE</span>' : ''}
        </div>
        <div class="card-date">${fmtDate(d)}</div>
        ${has && row.reels_tema ? `<div class="card-preview">${esc(row.reels_tema)}</div>` : ''}
        ${has ? '<div class="card-chev">&#8250;</div>' : ''}
      </div>`;
  }).join('');
  document.getElementById('cardsArea').innerHTML = `<div class="cards">${html}</div>`;
}

function openDetail(i) {
  const d = addDays(weekMonday, i);
  document.getElementById('detailDay').textContent  = DAYS[i];
  document.getElementById('detailDate').textContent = fmtDate(d);

  const body = document.getElementById('detailBody');
  const row  = weekData[i];

  if (!row) {
    body.innerHTML = `<div class="empty-day"><h3>SEM CONTEÚDO</h3><p>Conteúdo sendo preparado pela NeuroAdapt</p></div>`;
  } else {
    body.innerHTML = `
      <div class="blk">
        <div class="blk-title">&#9658; REELS</div>
        ${row.reels_tema ? `<div class="fld"><div class="fld-key">Tema</div><div class="fld-val">${esc(row.reels_tema)}</div></div>` : ''}
        ${row.reels_pilar ? `<div class="fld"><div class="fld-key">Pilar</div><div class="fld-val"><span class="pilar-badge ${pilarCls(row.reels_pilar)}">${esc(row.reels_pilar)}</span></div></div>` : ''}
        ${row.reels_direcionamento ? `<div class="fld"><div class="fld-key">Direcionamento</div><div class="fld-val">${esc(row.reels_direcionamento)}</div></div>` : ''}
        ${row.reels_gancho ? `<div class="fld"><div class="fld-key">Gancho</div><div class="fld-val red">"${esc(row.reels_gancho)}"</div></div>` : ''}
      </div>
      <div class="blk">
        <div class="blk-title">&#9658; STORIES</div>
        ${row.story_tema ? `<div class="fld"><div class="fld-key">Tema</div><div class="fld-val">${esc(row.story_tema)}</div></div>` : ''}
        <div class="stories-seq">
          ${row.story_1 ? `<div class="story-card"><div class="story-num">Story 1 &mdash; Gancho</div><div class="story-txt">${esc(row.story_1)}</div></div>` : ''}
          ${row.story_2 ? `<div class="story-card"><div class="story-num">Story 2 &mdash; Conteúdo</div><div class="story-txt">${esc(row.story_2)}</div></div>` : ''}
          ${row.story_3_tipo ? `
          <div class="story-card s3">
            <div class="story-num">Story 3 &mdash; Interação</div>
            <div class="interact-type">${esc(row.story_3_tipo)}</div>
            ${row.story_3_instrucao ? `<div class="story-txt">${esc(row.story_3_instrucao)}</div>` : ''}
          </div>` : ''}
        </div>
      </div>`;
  }

  document.getElementById('mainView').style.display = 'none';
  document.getElementById('detailView').style.display = 'block';
  document.getElementById('detailView').scrollTop = 0;
}

function closeDetail() {
  document.getElementById('detailView').style.display = 'none';
  document.getElementById('mainView').style.display = '';
}

function changeWeek(dir) { weekOffset += dir; loadWeek(); }

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeDetail(); });

loadWeek();
</script>
</body>
</html>
